<h2>Our Menu</h2>
<mat-card *ngFor="let item of menuItems" class="menu-item">
  <mat-card-header>
    <mat-card-title>{{ item.name }}</mat-card-title>
    <mat-card-subtitle>${{ item.price.toFixed(2) }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>{{ item.description }}</p>
  </mat-card-content>
</mat-card>
