<h2>Make a Reservation</h2>
<form [formGroup]="reservationForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="fill">
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" />
    <mat-error *ngIf="reservationForm.get('name')?.invalid">
      Name is required and must be at least 2 characters long.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" />
    <mat-error *ngIf="reservationForm.get('email')?.invalid">
      Please enter a valid email address.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Date</mat-label>
    <input matInput [matDatepicker]="picker" formControlName="date" />
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
    <mat-error *ngIf="reservationForm.get('date')?.invalid">
      Please select a valid date.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Time</mat-label>
    <input matInput type="time" formControlName="time" />
    <mat-error *ngIf="reservationForm.get('time')?.invalid">
      Please select a valid time.
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Number of Guests</mat-label>
    <input matInput type="number" formControlName="guests" />
    <mat-error *ngIf="reservationForm.get('guests')?.invalid">
      Please enter a number between 1 and 10.
    </mat-error>
  </mat-form-field>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    [disabled]="!reservationForm.valid"
  >
    Make Reservation
  </button>
</form>
